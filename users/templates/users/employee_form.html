{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Update Employee{% endblock %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Update Employee: {{ employee.username }}</h4> </div> <div class="card-body"> <form method="POST"> {% csrf_token %} {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success">Update Employee Details</button>
                        <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
