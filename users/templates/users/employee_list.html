{% extends 'base.html' %}
{% load currency_tags %}

{% block title %}Employees{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Employees</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'register' %}" class="btn btn-sm btn-outline-primary">
            <i class="bi bi-person-plus-fill"></i> Add New Employee
        </a>
    </div>
</div>

<!-- Filters -->
<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center py-2" data-bs-toggle="collapse"
        data-bs-target="#employeeFilterCollapse" style="cursor: pointer;">
        <span><i class="bi bi-funnel"></i> Filters</span>
        <i class="bi bi-chevron-down"></i>
    </div>
    <div class="collapse show" id="employeeFilterCollapse">
        <div class="card-body py-3">
            <form id="employeeFilterForm" onsubmit="applyFilters(); return false;">
                <div class="row g-2 align-items-center">
                    <div class="col-12 col-md-3">
                        <input type="text" id="filterSearch" class="form-control" placeholder="Search Name, ID..."
                            value="{{ search_query }}">
                    </div>

                    {% if is_admin %}
                    <div class="col-6 col-md-2">
                        <select id="filterRole" class="form-select" aria-label="Select Role">
                            <option value="">All Roles</option>
                            <option value="ADMIN" {% if role_filter == 'ADMIN' %}selected{% endif %}>Admin</option>
                            <option value="SUPERVISOR" {% if role_filter == 'SUPERVISOR' %}selected{% endif %}>Supervisor
                            </option>
                            <option value="WORKER" {% if role_filter == 'WORKER' %}selected{% endif %}>Worker</option>
                        </select>
                        </select>
                    </div>
                    {% endif %}

                    <div class="col-6 col-md-2">
                        <select id="filterStatus" class="form-select" aria-label="Select Status">
                            <option value="all" {% if status_filter == 'all' %}selected{% endif %}>All Status</option>
                            <option value="active" {% if status_filter == 'active' %}selected{% endif %}>Active</option>
                            <option value="inactive" {% if status_filter == 'inactive' %}selected{% endif %}>Inactive
                            </option>
                        </select>
                    </div>

                    <div class="col-6 col-md-{% if is_admin %}3{% else %}5{% endif %}">
                        <select id="filterSite" class="form-select" aria-label="Select Site">
                            <option value="">All Sites</option>
                            {% for site in sites %}
                            <option value="{{ site.id }}" {% if site_filter == site.id|stringformat:"i" %}selected{% endif %}>{{ site.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-6 col-md-2">
                        <div class="d-flex gap-2">
                            <button type="button" onclick="resetFilters()" class="btn btn-outline-secondary flex-grow-1"
                                title="Reset">
                                <i class="bi bi-x-lg"></i>
                            </button>
                            <button type="button" onclick="exportCSV(event)" class="btn btn-outline-success flex-grow-1"
                                title="Export to CSV">
                                <i class="bi bi-download"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="employeeContainer">
    {% include 'users/employee_table_partial.html' %}
</div>

{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const filterSearch = document.getElementById('filterSearch');
        const filterRole = document.getElementById('filterRole');
        const filterSite = document.getElementById('filterSite');
        const filterStatus = document.getElementById('filterStatus');

        // Add event listeners
        if (filterSearch) filterSearch.addEventListener('input', filterEmployees);
        if (filterRole) filterRole.addEventListener('change', filterEmployees);
        if (filterSite) filterSite.addEventListener('change', filterEmployees);
        if (filterStatus) filterStatus.addEventListener('change', filterEmployees);

        // Initial filter
        filterEmployees();
    });

    function filterEmployees() {
        const searchVal = document.getElementById('filterSearch').value.toLowerCase();
        const roleVal = document.getElementById('filterRole') ? document.getElementById('filterRole').value : '';
        const siteVal = document.getElementById('filterSite').value;
        const statusVal = document.getElementById('filterStatus').value; // 'all', 'active', 'inactive'

        const rows = document.querySelectorAll('#employeeTableBody .employee-row');

        rows.forEach(row => {
            const name = row.getAttribute('data-name') || '';
            const role = row.getAttribute('data-role') || '';
            const site = row.getAttribute('data-site') || '';
            const status = row.getAttribute('data-status') || ''; // 'active' or 'inactive'

            let matchesSearch = name.toLowerCase().includes(searchVal);
            let matchesRole = roleVal === '' || role === roleVal;
            let matchesSite = siteVal === '' || site === siteVal;

            let matchesStatus = true;
            if (statusVal === 'active') {
                matchesStatus = status === 'active';
            } else if (statusVal === 'inactive') {
                matchesStatus = status === 'inactive';
            }

            if (matchesSearch && matchesRole && matchesSite && matchesStatus) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    }

    function exportCSV(e) {
        if (e) e.preventDefault();
        const searchVal = document.getElementById('filterSearch').value;
        const roleVal = document.getElementById('filterRole') ? document.getElementById('filterRole').value : '';
        const siteVal = document.getElementById('filterSite').value;
        const statusVal = document.getElementById('filterStatus').value;

        const params = new URLSearchParams({
            search: searchVal,
            role: roleVal,
            site: siteVal,
            status: statusVal
        });

        // Use the separate export URL
        window.location.href = `{% url 'export_employees_csv' %}?${params.toString()}`;
    }

    function applyFilters() {
        filterEmployees();
    }

    function resetFilters() {
        document.getElementById('employeeFilterForm').reset();
        // Manually clear values and defaults
        document.getElementById('filterSearch').value = '';
        if (document.getElementById('filterRole')) document.getElementById('filterRole').value = '';
        document.getElementById('filterSite').value = '';
        document.getElementById('filterStatus').value = 'active';

        filterEmployees();
    }
</script>
{% endblock %}
