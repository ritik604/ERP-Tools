{% extends 'base.html' %}
{% load currency_tags %}

{% block title %}Employees{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Employees</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'register' %}" class="btn btn-sm btn-outline-primary">
            <i class="bi bi-person-plus-fill"></i> Add New Employee
        </a>
    </div>
</div>

<!-- Filters -->
<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center py-2" data-bs-toggle="collapse"
        data-bs-target="#employeeFilterCollapse" style="cursor: pointer;">
        <span><i class="bi bi-funnel"></i> Filters</span>
        <i class="bi bi-chevron-down"></i>
    </div>
    <div class="collapse show" id="employeeFilterCollapse">
        <div class="card-body py-3">
            <form id="employeeFilterForm" onsubmit="applyFilters(); return false;">
                <div class="row g-2 align-items-center">
                    <div class="col-12 col-md-5">
                        <input type="text" id="filterSearch" class="form-control" placeholder="Search Name, ID..."
                            value="{{ search_query }}">
                    </div>

                    {% if is_admin %}
                    <div class="col-6 col-md-2">
                        <select id="filterRole" class="form-select" aria-label="Select Role">
                            <option value="">All Roles</option>
                            <option value="ADMIN" {% if role_filter == 'ADMIN' %}selected{% endif %}>Admin</option>
                            <option value="SUPERVISOR" {% if role_filter == 'SUPERVISOR' %}selected{% endif %}>Supervisor
                            </option>
                            <option value="WORKER" {% if role_filter == 'WORKER' %}selected{% endif %}>Worker</option>
                        </select>
                    </div>
                    {% endif %}

                    <div class="col-6 col-md-{% if is_admin %}3{% else %}5{% endif %}">
                        <select id="filterSite" class="form-select" aria-label="Select Site">
                            <option value="">All Sites</option>
                            {% for site in sites %}
                            <option value="{{ site.id }}" {% if site_filter == site.id|stringformat:"i" %}selected{% endif %}>{{ site.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-6 col-md-2">
                        <div class="d-flex gap-2">
                            <button type="button" onclick="applyFilters()" class="btn btn-primary flex-grow-1"
                                title="Apply Filter">
                                <i class="bi bi-search"></i>
                            </button>
                            <button type="button" onclick="resetFilters()" class="btn btn-outline-secondary flex-grow-1"
                                title="Reset Filters">
                                <i class="bi bi-arrow-clockwise"></i>
                            </button>
                            <button type="button" onclick="exportCSV(event)" class="btn btn-outline-success flex-grow-1"
                                title="Export to CSV">
                                <i class="bi bi-download"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="employeeContainer">
    {% include 'users/employee_table_partial.html' %}
</div>

{% endblock %}

{% block extra_js %}
<script>
    function fetchPage(pageNumber = 1) {
        const searchVal = document.getElementById('filterSearch').value;
        const roleVal = document.getElementById('filterRole') ? document.getElementById('filterRole').value : '';
        const siteVal = document.getElementById('filterSite').value;

        const params = new URLSearchParams({
            search: searchVal,
            role: roleVal,
            site: siteVal,
            page: pageNumber
        });

        const container = document.getElementById('employeeContainer');
        container.style.opacity = '0.5';
        container.style.pointerEvents = 'none';

        fetch(`${window.location.pathname}?${params.toString()}`, {
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
            .then(response => response.text())
            .then(html => {
                container.innerHTML = html;
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';
            })
            .catch(error => {
                console.error('Error fetching employees:', error);
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';
            });
    }

    function exportCSV(e) {
        if (e) e.preventDefault();
        const searchVal = document.getElementById('filterSearch').value;
        const roleVal = document.getElementById('filterRole') ? document.getElementById('filterRole').value : '';
        const siteVal = document.getElementById('filterSite').value;

        const params = new URLSearchParams({
            search: searchVal,
            role: roleVal,
            site: siteVal
        });

        // Use the separate export URL
        window.location.href = `{% url 'export_employees_csv' %}?${params.toString()}`;
    }

    function applyFilters() {
        fetchPage(1);
    }

    function resetFilters() {
        document.getElementById('employeeFilterForm').reset();
        // Manually clear values
        document.getElementById('filterSearch').value = '';
        if (document.getElementById('filterRole')) document.getElementById('filterRole').value = '';
        document.getElementById('filterSite').value = '';

        applyFilters();
    }
</script>
{% endblock %}
