{% extends 'base.html' %}

{% block title %}Fuel Tracking - Construction ERP{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Fuel Tracking</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'fuel:fuel_create' %}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> <span class="d-none d-sm-inline">Add Fuel Record</span><span
                class="d-sm-none">Add</span>
        </a>
    </div>
</div>

<!-- Filters - Collapsible on Mobile -->
<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center py-2" data-bs-toggle="collapse"
        data-bs-target="#filterCollapse" style="cursor: pointer;">
        <span><i class="bi bi-funnel"></i> Filters</span>
        <i class="bi bi-chevron-down"></i>
    </div>
    <div class="collapse show" id="filterCollapse">
        <div class="card-body py-3">
            <form id="fuelFilterForm" onsubmit="applyFuelFilters(); return false;">
                <div class="row g-2">
                    <div class="col-12 col-md-3">
                        <input type="text" id="filterQ" class="form-control"
                            placeholder="Search ID, Vehicle or Project..." value="{{ filter_q }}">
                    </div>
                    <div class="col-6 col-md-2">
                        <select id="filterProject" class="form-select">
                            <option value="">All Projects</option>
                            {% for p in projects %}
                            <option value="{{ p.id }}" {% if filter_project == p.id|stringformat:"i" %}selected{% endif %}>{{ p.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-6 col-md-2">
                        <input type="date" id="filterDateFrom" class="form-control" placeholder="From"
                            value="{{ filter_date_from }}">
                    </div>
                    <div class="col-6 col-md-2">
                        <input type="date" id="filterDateTo" class="form-control" placeholder="To"
                            value="{{ filter_date_to }}">
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="d-flex gap-2">
                            <button type="button" onclick="applyFuelFilters()" class="btn btn-primary flex-grow-1">
                                <i class="bi bi-search"></i> <span class="d-none d-md-inline">Apply</span>
                            </button>
                            <a href="{% url 'fuel:fuel_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg"></i>
                            </a>
                            <a href="{% url 'fuel:fuel_export_csv' %}" id="fuelExportBtn" onclick="exportFuelCSV(event)"
                                download="fuel_report.csv" class="btn btn-outline-success">
                                <i class="bi bi-download"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="fuelContainer">
    {% include 'fuel/fuel_table_partial.html' %}
</div>
{% endblock %}

{% block extra_js %}
<script>
    function fetchFuelPage(pageNumber = 1) {
        const qVal = document.getElementById('filterQ').value;
        const projectVal = document.getElementById('filterProject').value;
        const dateFromVal = document.getElementById('filterDateFrom').value;
        const dateToVal = document.getElementById('filterDateTo').value;

        const params = new URLSearchParams({
            q: qVal,
            project: projectVal,
            date_from: dateFromVal,
            date_to: dateToVal,
            page: pageNumber
        });

        const container = document.getElementById('fuelContainer');
        container.style.opacity = '0.5';
        container.style.pointerEvents = 'none';

        fetch(`${window.location.pathname}?${params.toString()}`, {
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
            .then(response => response.text())
            .then(html => {
                container.innerHTML = html;
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';

                // Sync export form
                document.getElementById('exportQ').value = qVal;
            })
            .catch(error => {
                console.error('Error fetching fuel data:', error);
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';
            });
    }

    function exportFuelCSV(e) {
        if (e) e.preventDefault();
        const qVal = document.getElementById('filterQ').value;
        const projectVal = document.getElementById('filterProject').value;
        const dateFromVal = document.getElementById('filterDateFrom').value;
        const dateToVal = document.getElementById('filterDateTo').value;

        const params = new URLSearchParams({
            q: qVal,
            project: projectVal,
            date_from: dateFromVal,
            date_to: dateToVal
        });

        window.location.href = `{% url 'fuel:fuel_export_csv' %}?${params.toString()}`;
    }

    function applyFuelFilters() {
        fetchFuelPage(1);
    }
</script>
{% endblock %}
