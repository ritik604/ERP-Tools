{% extends 'base.html' %}

{% block title %}Attendance History{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Attendance History</h1>
</div>

<!-- Filters - Collapsible on Mobile -->
<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center py-2" data-bs-toggle="collapse"
        data-bs-target="#attendanceFilterCollapse" style="cursor: pointer;">
        <span><i class="bi bi-funnel"></i> Filters</span>
        <i class="bi bi-chevron-down"></i>
    </div>
    <div class="collapse show" id="attendanceFilterCollapse">
        <div class="card-body py-3">
            <form id="attendanceFilterForm" onsubmit="applyFilters(); return false;">
                <div class="row g-2">
                    <div class="col-12 col-md-2">
                        <input type="text" id="filterName" class="form-control" placeholder="Search..."
                            value="{{ filter_name }}">
                    </div>

                    {% if sites %}
                    <div class="col-6 col-md-2">
                        <select id="filterSite" class="form-select">
                            <option value="">All Sites</option>
                            {% for s in sites %}
                            <option value="{{ s.id }}" {% if filter_site == s.id|stringformat:'i' %}selected{% endif %}>
                                {{ s.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% endif %}

                    <div class="col-6 col-md-2">
                        <select id="filterStatus" class="form-select">
                            <option value="">All Statuses</option>
                            {% for code, label in status_choices %}
                            <option value="{{ code }}" {% if filter_status == code %}selected{% endif %}>{{ label }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-6 col-md-2">
                        <input type="date" id="filterStart" class="form-control" value="{{ filter_start }}"
                            placeholder="From">
                    </div>
                    <div class="col-6 col-md-2">
                        <input type="date" id="filterEnd" class="form-control" value="{{ filter_end }}"
                            placeholder="To">
                    </div>

                    <div class="col-6 col-md-2">
                        <div class="d-flex gap-2">
                            <button type="button" onclick="applyFilters()" class="btn btn-primary flex-grow-1"
                                title="Apply Filter">
                                <i class="bi bi-search"></i>
                            </button>
                            <button type="button" onclick="resetFilters()" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg"></i>
                            </button>
                            <a href="{% url 'attendance:attendance_export_csv' %}" id="exportBtn"
                                onclick="exportCSV(event)" download="attendance_report.csv"
                                class="btn btn-outline-success">
                                <i class="bi bi-download"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="attendanceContainer">
    {% include 'attendance/attendance_table_partial.html' %}
</div>

{% endblock %}

{% block extra_js %}
<script>
    function fetchPage(pageNumber = 1) {
        const nameVal = document.getElementById('filterName').value;
        const siteVal = document.getElementById('filterSite') ? document.getElementById('filterSite').value : '';
        const statusVal = document.getElementById('filterStatus').value;
        const startVal = document.getElementById('filterStart').value;
        const endVal = document.getElementById('filterEnd').value;

        const params = new URLSearchParams({
            name: nameVal,
            site: siteVal,
            status: statusVal,
            start_date: startVal,
            end_date: endVal,
            page: pageNumber
        });

        const container = document.getElementById('attendanceContainer');
        container.style.opacity = '0.5';
        container.style.pointerEvents = 'none';

        fetch(`${window.location.pathname}?${params.toString()}`, {
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
            .then(response => response.text())
            .then(html => {
                container.innerHTML = html;
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';
            })
            .catch(error => {
                console.error('Error fetching attendance:', error);
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';
            });
    }

    function exportCSV(e) {
        if (e) e.preventDefault();
        const nameVal = document.getElementById('filterName').value;
        const siteVal = document.getElementById('filterSite') ? document.getElementById('filterSite').value : '';
        const statusVal = document.getElementById('filterStatus').value;
        const startVal = document.getElementById('filterStart').value;
        const endVal = document.getElementById('filterEnd').value;

        const params = new URLSearchParams({
            name: nameVal,
            site: siteVal,
            status: statusVal,
            start_date: startVal,
            end_date: endVal
        });

        window.location.href = `{% url 'attendance:attendance_export_csv' %}?${params.toString()}`;
    }

    function applyFilters() {
        fetchPage(1);
    }

    function resetFilters() {
        document.getElementById('attendanceFilterForm').reset();
        applyFilters();
    }

    // Initialize on load? Yes, but it already has data from initial server render.
</script>
{% endblock %}
