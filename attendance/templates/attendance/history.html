{% extends 'base.html' %}

{% block title %}Attendance History{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Attendance History</h1>
</div>

<div class="row mb-3">
    <div class="col-md-12">
        <form id="attendanceFilterForm" class="d-flex gap-2" onsubmit="applyFilters(); return false;">
            <input type="text" id="filterName" class="form-control" style="max-width: 200px;" placeholder="Name..."
                value="{{ filter_name }}">

            {% if sites %}
            <select id="filterSite" class="form-select" style="max-width: 200px;">
                <option value="">All Sites</option>
                {% for s in sites %}
                <option value="{{ s.id }}" {% if filter_site == s.id|stringformat:'i' %}selected{% endif %}>{{ s.name }}
                </option>
                {% endfor %}
            </select>
            {% endif %}

            <input type="date" id="filterStart" class="form-control" style="max-width: 160px;" title="Start Date"
                value="{{ filter_start }}">
            <input type="date" id="filterEnd" class="form-control" style="max-width: 160px;" title="End Date"
                value="{{ filter_end }}">

            <button type="button" onclick="applyFilters()" class="btn btn-primary">Apply Filter</button>
            <button type="button" onclick="resetFilters()" class="btn btn-outline-secondary">Reset</button>
            <a href="{% url 'attendance:attendance_export_csv' %}" id="exportBtn" onclick="exportCSV(event)"
                download="attendance_report.csv" class="btn btn-outline-success">
                <i class="bi bi-file-earmark-spreadsheet"></i> Export CSV
            </a>
        </form>
    </div>
</div>

<div id="attendanceContainer">
    {% include 'attendance/attendance_table_partial.html' %}
</div>

{% endblock %}

{% block extra_js %}
<script>
    function fetchPage(pageNumber = 1) {
        const nameVal = document.getElementById('filterName').value;
        const siteVal = document.getElementById('filterSite') ? document.getElementById('filterSite').value : '';
        const startVal = document.getElementById('filterStart').value;
        const endVal = document.getElementById('filterEnd').value;

        const params = new URLSearchParams({
            name: nameVal,
            site: siteVal,
            start_date: startVal,
            end_date: endVal,
            page: pageNumber
        });

        const container = document.getElementById('attendanceContainer');
        container.style.opacity = '0.5';
        container.style.pointerEvents = 'none';

        fetch(`${window.location.pathname}?${params.toString()}`, {
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
            .then(response => response.text())
            .then(html => {
                container.innerHTML = html;
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';
            })
            .catch(error => {
                console.error('Error fetching attendance:', error);
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';
            });
    }

    function exportCSV(e) {
        if (e) e.preventDefault();
        const nameVal = document.getElementById('filterName').value;
        const siteVal = document.getElementById('filterSite') ? document.getElementById('filterSite').value : '';
        const startVal = document.getElementById('filterStart').value;
        const endVal = document.getElementById('filterEnd').value;

        const params = new URLSearchParams({
            name: nameVal,
            site: siteVal,
            start_date: startVal,
            end_date: endVal
        });

        window.location.href = `{% url 'attendance:attendance_export_csv' %}?${params.toString()}`;
    }

    function applyFilters() {
        fetchPage(1);
    }

    function resetFilters() {
        document.getElementById('attendanceFilterForm').reset();
        applyFilters();
    }

    // Initialize on load? Yes, but it already has data from initial server render.
</script>
{% endblock %}
