{% extends 'base.html' %}

{% block title %}Delete Vehicle - {{ vehicle.name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5 text-center">
                    <div class="text-danger mb-4">
                        <i class="bi bi-exclamation-triangle-fill" style="font-size: 4rem;"></i>
                    </div>
                    <h3 class="fw-bold mb-3">Confirm Deletion</h3>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete the vehicle <strong>{{ vehicle.name }}</strong> ({{vehicle.vehicle_id }})?
                        This action cannot be undone.
                    </p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="bi bi-trash"></i> Yes, Delete Vehicle
                            </button>
                            <a href="{% url 'vehicle_detail' pk=vehicle.pk %}" class="btn btn-outline-secondary btn-lg">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
