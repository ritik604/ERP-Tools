{% extends 'base.html' %}

{% block title %}Audit Trail - ManageX{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-4">
    <div>
        <h1 class="h2 mb-1">Audit Trail</h1>
    </div>
</div>

<!-- Filters -->
<div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
        data-bs-target="#filterCollapse" style="cursor: pointer;">
        <span><i class="bi bi-funnel me-2"></i>Filters</span>
        <i class="bi bi-chevron-down"></i>
    </div>
    <div class="collapse show" id="filterCollapse">
        <div class="card-body">
            <form id="auditFilterForm" onsubmit="applyFilters(); return false;" class="row g-2 align-items-center">
                <div class="col-6 col-md-2">
                    <select id="filterModule" class="form-select" aria-label="Select Module">
                        <option value="">All Modules</option>
                        {% for module in modules %}
                        <option value="{{ module }}" {% if filter_module == module %}selected{% endif %}>{{ module|title }}</option> {% endfor %} </select> </div> <div class="col-6 col-md-2"> <select id="filterAction" class="form-select" aria-label="Select Action"> <option value="">All Actions</option> {% for action_code, action_name in actions %} <option value="{{ action_code }}" {% if filter_action == action_code %}selected{% endif %}>{{ action_name }}</option> {% endfor %} </select> </div> <div class="col-6 col-md-2"> <select id="filterUser" class="form-select" aria-label="Select User"> <option value="">All Users</option> {% for u in users %} <option value="{{ u.id }}" {% if filter_user == u.id|stringformat:"i" %}selected{% endif %}>{{ u.username }}</option> {% endfor %} </select> </div> <div class="col-6 col-md-2"> <input type="{% if filter_date_from %}date{% else %}text{% endif %}" id="filterDateFrom" class="form-control" value="{{ filter_date_from }}" placeholder="From Date"
                        onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'">
                </div>
                <div class="col-6 col-md-2">
                    <input type="{% if filter_date_to %}date{% else %}text{% endif %}" id="filterDateTo"
                        class="form-control" value="{{ filter_date_to }}" placeholder="To Date"
                        onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'">
                </div>
                <div class="col-6 col-md-2">
                    <div class="d-flex gap-2">
                        <button type="button" onclick="applyFilters()" class="btn btn-primary flex-grow-1"
                            title="Apply Filter">
                            <i class="bi bi-search"></i>
                        </button>
                        <button type="button" onclick="resetFilters()" class="btn btn-outline-secondary flex-grow-1"
                            title="Reset Filters">
                            <i class="bi bi-x-lg"></i>
                        </button>
                        <button type="button" onclick="exportCSV(event)" class="btn btn-outline-success flex-grow-1"
                            title="Export to CSV">
                            <i class="bi bi-download"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="auditContainer">
    {% include 'audit/audit_table_partial.html' %}
</div>

{% endblock %}

{% block extra_js %}
<script>
    function fetchPage(pageNumber = 1) {
        const moduleVal = document.getElementById('filterModule').value;
        const actionVal = document.getElementById('filterAction').value;
        const userVal = document.getElementById('filterUser').value;
        const dateFromVal = document.getElementById('filterDateFrom').value;
        const dateToVal = document.getElementById('filterDateTo').value;

        const params = new URLSearchParams({
            module: moduleVal,
            action: actionVal,
            user: userVal,
            date_from: dateFromVal,
            date_to: dateToVal,
            page: pageNumber
        });

        const container = document.getElementById('auditContainer');
        container.style.opacity = '0.5';
        container.style.pointerEvents = 'none';

        fetch(`${window.location.pathname}?${params.toString()}`, {
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
            .then(response => response.text())
            .then(html => {
                container.innerHTML = html;
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';
            })
            .catch(error => {
                console.error('Error fetching audit logs:', error);
                container.style.opacity = '1';
                container.style.pointerEvents = 'auto';
            });
    }

    function exportCSV(e) {
        if (e) e.preventDefault();
        const moduleVal = document.getElementById('filterModule').value;
        const actionVal = document.getElementById('filterAction').value;
        const userVal = document.getElementById('filterUser').value;
        const dateFromVal = document.getElementById('filterDateFrom').value;
        const dateToVal = document.getElementById('filterDateTo').value;

        const params = new URLSearchParams({
            module: moduleVal,
            action: actionVal,
            user: userVal,
            date_from: dateFromVal,
            date_to: dateToVal,
            export: 'true'
        });

        window.location.href = `?${params.toString()}`;
    }

    function applyFilters() {
        fetchPage(1);
    }

    function resetFilters() {
        document.getElementById('auditFilterForm').reset();
        document.getElementById('filterModule').value = '';
        document.getElementById('filterAction').value = '';
        document.getElementById('filterUser').value = '';
        document.getElementById('filterDateFrom').value = '';
        document.getElementById('filterDateTo').value = '';

        applyFilters();
    }
</script>
{% endblock %}
